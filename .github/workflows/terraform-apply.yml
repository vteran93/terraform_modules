name: Terraform Apply

on:
  workflow_call:
    inputs:
      aws_region:
        description: "AWS region"
        required: false
        type: string
        default: "us-east-1"
      terraform_dir:
        description: "Path to Terraform directory"
        required: false
        type: string
        default: "infra/terraform"
      terraform_version:
        description: "Terraform version to install"
        required: false
        type: string
        default: "1.9.0"
    secrets:
      aws_deploy_role_arn:
        description: "IAM Role ARN for OIDC-based deploy"
        required: true
      tf_vars:
        description: "Newline-separated TF_VAR_* exports (e.g. TF_VAR_db_password=xxx)"
        required: false
      backend_bucket:
        description: "S3 bucket for Terraform state"
        required: true
      backend_key:
        description: "S3 key for Terraform state file"
        required: true
      backend_dynamodb_table:
        description: "DynamoDB table for state locking"
        required: true
    outputs:
      instance_id:
        description: "EC2 instance ID"
        value: ${{ jobs.apply.outputs.instance_id }}
      ecr_repository_url:
        description: "ECR repository URL"
        value: ${{ jobs.apply.outputs.ecr_repository_url }}
      ecr_repository_name:
        description: "ECR repository name"
        value: ${{ jobs.apply.outputs.ecr_repository_name }}
      elastic_ip:
        description: "Elastic IP"
        value: ${{ jobs.apply.outputs.elastic_ip }}
      app_name:
        description: "Application name"
        value: ${{ jobs.apply.outputs.app_name }}
      compose_ssm_parameter:
        description: "SSM parameter name storing docker-compose content"
        value: ${{ jobs.apply.outputs.compose_ssm_parameter }}

jobs:
  apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    outputs:
      instance_id: ${{ steps.outputs.outputs.instance_id }}
      ecr_repository_url: ${{ steps.outputs.outputs.ecr_repository_url }}
      ecr_repository_name: ${{ steps.outputs.outputs.ecr_repository_name }}
      elastic_ip: ${{ steps.outputs.outputs.elastic_ip }}
      app_name: ${{ steps.outputs.outputs.app_name }}
      compose_ssm_parameter: ${{ steps.outputs.outputs.compose_ssm_parameter }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.aws_deploy_role_arn }}
          aws-region: ${{ inputs.aws_region }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ inputs.terraform_version }}
          terraform_wrapper: false

      - name: Export TF_VAR secrets
        env:
          TF_VARS_RAW: ${{ secrets.tf_vars }}
        run: |
          [ -z "$TF_VARS_RAW" ] && exit 0
          while IFS= read -r line; do
            [ -z "$line" ] && continue
            echo "::add-mask::${line#*=}"
            echo "$line" >> "$GITHUB_ENV"
          done <<< "$TF_VARS_RAW"

      - name: Terraform Init
        working-directory: ${{ inputs.terraform_dir }}
        run: |
          terraform init -input=false \
            -backend-config="bucket=${{ secrets.backend_bucket }}" \
            -backend-config="key=${{ secrets.backend_key }}" \
            -backend-config="region=${{ inputs.aws_region }}" \
            -backend-config="dynamodb_table=${{ secrets.backend_dynamodb_table }}"

      - name: Terraform Apply
        working-directory: ${{ inputs.terraform_dir }}
        run: terraform apply -auto-approve -input=false

      - name: Capture outputs
        id: outputs
        working-directory: ${{ inputs.terraform_dir }}
        run: |
          echo "instance_id=$(terraform output -raw instance_id)" >> "$GITHUB_OUTPUT"
          echo "ecr_repository_url=$(terraform output -raw ecr_repository_url)" >> "$GITHUB_OUTPUT"
          echo "ecr_repository_name=$(terraform output -raw ecr_repository_name)" >> "$GITHUB_OUTPUT"
          echo "elastic_ip=$(terraform output -raw elastic_ip)" >> "$GITHUB_OUTPUT"
          echo "app_name=$(terraform output -raw app_name 2>/dev/null || echo '')" >> "$GITHUB_OUTPUT"
          echo "compose_ssm_parameter=$(terraform output -raw compose_ssm_parameter 2>/dev/null || echo '')" >> "$GITHUB_OUTPUT"
