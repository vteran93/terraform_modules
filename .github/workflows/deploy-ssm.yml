name: Deploy via SSM

on:
  workflow_call:
    inputs:
      aws_region:
        description: "AWS region"
        required: false
        type: string
        default: "us-east-1"
      instance_id:
        description: "EC2 instance ID"
        required: true
        type: string
      ecr_image_uri:
        description: "Full ECR image URI (registry/repo:tag)"
        required: true
        type: string
      app_name:
        description: "Application name (used for working directory /opt/<app_name>)"
        required: true
        type: string
      health_check_path:
        description: "HTTP health check path"
        required: false
        type: string
        default: "/health"
      health_check_port:
        description: "HTTP health check port"
        required: false
        type: number
        default: 8000
      deploy_timeout_seconds:
        description: "SSM command timeout"
        required: false
        type: number
        default: 300
    secrets:
      aws_deploy_role_arn:
        description: "IAM Role ARN for OIDC-based deploy"
        required: true

jobs:
  deploy:
    name: Deploy & Verify
    runs-on: ubuntu-latest

    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.aws_deploy_role_arn }}
          aws-region: ${{ inputs.aws_region }}

      - name: Deploy via SSM
        id: ssm-deploy
        env:
          INSTANCE_ID: ${{ inputs.instance_id }}
          IMAGE_URI: ${{ inputs.ecr_image_uri }}
          APP_NAME: ${{ inputs.app_name }}
          ECR_REGISTRY: ${{ inputs.ecr_image_uri }}
        run: |
          REGISTRY="${ECR_REGISTRY%%/*}"
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --timeout-seconds ${{ inputs.deploy_timeout_seconds }} \
            --parameters commands="[
              \"set -euo pipefail\",
              \"aws ecr get-login-password --region ${{ inputs.aws_region }} | docker login --username AWS --password-stdin ${REGISTRY}\",
              \"docker pull ${IMAGE_URI}\",
              \"cd /opt/${APP_NAME}\",
              \"sed -i 's|image: *${REGISTRY}/.*|image: ${IMAGE_URI}|g' docker-compose.yml\",
              \"/usr/local/bin/docker-compose up -d --force-recreate\",
              \"docker image prune -f\"
            ]" \
            --query "Command.CommandId" \
            --output text)
          echo "command_id=${COMMAND_ID}" >> "$GITHUB_OUTPUT"

      - name: Wait for deployment
        env:
          INSTANCE_ID: ${{ inputs.instance_id }}
          COMMAND_ID: ${{ steps.ssm-deploy.outputs.command_id }}
        run: |
          for i in $(seq 1 30); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" \
              --query "Status" \
              --output text 2>/dev/null || echo "Pending")

            case "$STATUS" in
              Success)
                echo "Deployment succeeded"
                exit 0
                ;;
              Failed|Cancelled|TimedOut)
                echo "Deployment failed with status: $STATUS"
                aws ssm get-command-invocation \
                  --command-id "$COMMAND_ID" \
                  --instance-id "$INSTANCE_ID" \
                  --query "StandardErrorContent" \
                  --output text
                exit 1
                ;;
            esac

            echo "Status: $STATUS — waiting (attempt $i/30)..."
            sleep 10
          done

          echo "Timed out waiting for deployment"
          exit 1

      - name: Health check
        env:
          INSTANCE_ID: ${{ inputs.instance_id }}
        run: |
          HEALTH_CMD_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --parameters commands='["curl -sf http://localhost:${{ inputs.health_check_port }}${{ inputs.health_check_path }} || exit 1"]' \
            --query "Command.CommandId" \
            --output text)

          sleep 15

          STATUS=$(aws ssm get-command-invocation \
            --command-id "$HEALTH_CMD_ID" \
            --instance-id "$INSTANCE_ID" \
            --query "Status" \
            --output text)

          if [ "$STATUS" != "Success" ]; then
            echo "Health check failed (status: $STATUS)"
            exit 1
          fi

          echo "Health check passed"
